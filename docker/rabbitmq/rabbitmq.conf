listeners.tcp.default = 5672
management.tcp.ip = 0.0.0.0
management.tcp.port = 15672

vm_memory_high_watermark.relative = 0.55
total_memory_available_override_value = 384Mi
disk_free_limit.absolute = 512MB
heartbeat = 60
channel_max = 128
credential_validator.validation_backend = rabbit_credential_validator_min_password_length
credential_validator.min_length = 32

# 空节点启动时导入预生成的最小权限用户、vhost 与权限定义。
definitions.import_backend = local_filesystem
definitions.local.path = /run/secrets/rabbitmq-definitions.json
definitions.skip_if_unchanged = true

log.console = true
log.file = false
