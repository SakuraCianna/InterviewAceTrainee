map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

# Empty map keys are not accounted, so only AI-producing POST requests use this zone.
map "$request_method:$uri" $ai_submit_key {
    default "";
    ~^POST:/api/(?:interviews|interview-materials|reports|speech)(?:/|$) $binary_remote_addr;
    ~^POST:/api/tasks/[0-9A-Fa-f-]+/retry$ $binary_remote_addr;
}

limit_req_zone $binary_remote_addr zone=api_per_ip:2m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:2m rate=6r/m;
limit_req_zone $binary_remote_addr zone=task_poll_per_ip:2m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload_per_ip:2m rate=6r/m;
limit_req_zone $ai_submit_key zone=ai_submit_per_ip:2m rate=12r/m;
limit_conn_zone $binary_remote_addr zone=client_conn_per_ip:2m;
limit_conn_zone $binary_remote_addr zone=ws_conn_per_ip:2m;

gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name sakuracianna.icu www.sakuracianna.icu;
    # 固定正式域名，避免攻击者通过 Host 头注入跳转目标。
    return 301 https://sakuracianna.icu$request_uri;
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/sakuracianna.icu_bundle.pem;
    ssl_certificate_key /etc/nginx/certs/sakuracianna.icu.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 444;
}

server {
    listen 443 ssl;
    http2 on;
    server_name sakuracianna.icu www.sakuracianna.icu;

    ssl_certificate /etc/nginx/certs/sakuracianna.icu_bundle.pem;
    ssl_certificate_key /etc/nginx/certs/sakuracianna.icu.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:TLS:2m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/snippets/security-headers.conf;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $api_upstream http://api:8000;
    set $frontend_upstream http://frontend:80;

    limit_req_status 429;
    limit_conn_status 429;
    limit_conn client_conn_per_ip 40;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 405;
    }

    client_max_body_size 2m;
    client_body_buffer_size 128k;
    client_body_timeout 20s;
    client_header_timeout 10s;
    send_timeout 30s;

    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_hide_header X-Powered-By;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # 生产入口只有这一层 Nginx；覆盖而不是拼接客户端头，防止伪造首地址绕过应用层 IP 限流。
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;

    location ^~ /api/ws/speech/asr/ {
        limit_conn ws_conn_per_ip 4;
        proxy_pass $api_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 420s;
        proxy_send_timeout 420s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /api/ws/ {
        return 404;
    }

    location ~ ^/api/auth/(?:email-code/(?:request|login)|password/(?:login|register|reset|change)|admin/login)$ {
        client_max_body_size 64k;
        limit_req zone=auth_per_ip burst=3 nodelay;
        proxy_pass $api_upstream;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /api/interview-materials {
        client_max_body_size 6m;
        client_body_timeout 60s;
        limit_req zone=upload_per_ip burst=2 nodelay;
        limit_req zone=ai_submit_per_ip burst=2 nodelay;
        proxy_pass $api_upstream;
        proxy_request_buffering on;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location ~ ^/api/tasks/[0-9A-Fa-f-]+$ {
        limit_req zone=task_poll_per_ip burst=10 nodelay;
        proxy_pass $api_upstream;
        proxy_read_timeout 15s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        add_header Vary "Authorization, Cookie" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location /api/ {
        limit_req zone=api_per_ip burst=40 nodelay;
        limit_req zone=ai_submit_per_ip burst=3 nodelay;
        proxy_pass $api_upstream;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location /assets/ {
        proxy_pass $frontend_upstream;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
        access_log off;
    }

    location = /index.html {
        proxy_pass $frontend_upstream;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/security-headers.conf;
    }
}
