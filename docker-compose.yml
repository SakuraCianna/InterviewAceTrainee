name: mianba

services:
  postgres:
    image: postgres:18
    container_name: mianba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mianba
      POSTGRES_USER: mianba
      POSTGRES_PASSWORD: mianba
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mianba -d mianba"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: mianba-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    image: mianba-backend:local
    container_name: mianba-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://mianba:mianba@postgres:5432/mianba
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database_backups:/app/database_backups
    expose:
      - "8000"

  migrate:
    build:
      context: ./Backend
    image: mianba-backend:local
    container_name: mianba-migrate
    restart: "no"
    profiles:
      - migrate
    env_file:
      - ./Backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://mianba:mianba@postgres:5432/mianba
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database_backups:/app/database_backups
    command: ["uv", "run", "python", "-m", "app.cli.safe_migrate"]

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_ADMIN_ENTRY_PATH: /sakuracianna
        VITE_ICP_NUMBER: ${VITE_ICP_NUMBER:-ICP备案号待填写}
        VITE_POLICE_RECORD_NUMBER: ${VITE_POLICE_RECORD_NUMBER:-公安备案号待填写}
    container_name: mianba-frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.29-alpine
    container_name: mianba-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/sakuracianna.icu_bundle.pem:/etc/nginx/certs/sakuracianna.icu_bundle.pem:ro
      - ./nginx/sakuracianna.icu.key:/etc/nginx/certs/sakuracianna.icu.key:ro

volumes:
  postgres-data:
  redis-data:
