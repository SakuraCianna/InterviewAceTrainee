name: mianba

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: mianba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mianba
      POSTGRES_USER: mianba
      POSTGRES_PASSWORD: mianba
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mianba -d mianba"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: mianba-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    image: mianba-backend:local
    container_name: mianba-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://mianba:mianba@postgres:5432/mianba
      REDIS_URL: redis://redis:6379/0
      AUTH_COOKIE_SECURE: "true"
      EXPOSE_DEV_EMAIL_CODES: "false"
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      UVICORN_LIMIT_CONCURRENCY: ${UVICORN_LIMIT_CONCURRENCY:-800}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-8}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-4}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-5}
      DATABASE_POOL_RECYCLE_SECONDS: ${DATABASE_POOL_RECYCLE_SECONDS:-1800}
      LLM_CONCURRENCY_LIMIT: ${LLM_CONCURRENCY_LIMIT:-24}
      LLM_CAPACITY_LEASE_SECONDS: ${LLM_CAPACITY_LEASE_SECONDS:-45}
      REALTIME_ASR_CONCURRENCY_LIMIT: ${REALTIME_ASR_CONCURRENCY_LIMIT:-80}
      REALTIME_ASR_CAPACITY_LEASE_SECONDS: ${REALTIME_ASR_CAPACITY_LEASE_SECONDS:-420}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database_backups:/app/database_backups
    logging: *default-logging
    expose:
      - "8000"

  migrate:
    build:
      context: ./Backend
    image: mianba-backend:local
    container_name: mianba-migrate
    restart: "no"
    profiles:
      - migrate
    env_file:
      - ./Backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://mianba:mianba@postgres:5432/mianba
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database_backups:/app/database_backups
    logging: *default-logging
    command: ["python", "-m", "app.cli.safe_migrate"]

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_ADMIN_ENTRY_PATH: /sakuracianna
        VITE_ICP_NUMBER: ${VITE_ICP_NUMBER:-湘ICP备2025151258号-1}
        VITE_POLICE_RECORD_NUMBER: ${VITE_POLICE_RECORD_NUMBER:-}
    container_name: mianba-frontend
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "80"

  nginx:
    image: nginx:1.29-alpine
    container_name: mianba-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/sakuracianna.icu_bundle.pem:/etc/nginx/certs/sakuracianna.icu_bundle.pem:ro
      - ./nginx/sakuracianna.icu.key:/etc/nginx/certs/sakuracianna.icu.key:ro
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
