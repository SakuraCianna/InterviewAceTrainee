name: mianba

services:
  postgres:
    image: postgres:18
    container_name: mianba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mianba
      POSTGRES_USER: mianba
      POSTGRES_PASSWORD: mianba
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mianba -d mianba"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: mianba-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: mianba-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./Frontend
    container_name: mianba-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

  nginx:
    image: nginx:1.29-alpine
    container_name: mianba-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
