name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - sakuracianna
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java 21 test and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg18-bookworm@sha256:12a379b47ad65289572ea0756efc11b7c241a6662833e8af7038cd3b73d647e0
        env:
          POSTGRES_DB: mianba_integration_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: integration-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mianba_integration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: Backend/pom.xml

      - name: Test, package and verify PostgreSQL constraints
        working-directory: Backend
        env:
          MIANBA_IT_DATABASE_URL: jdbc:postgresql://127.0.0.1:5432/mianba_integration_test
          MIANBA_IT_DATABASE_USERNAME: postgres
          MIANBA_IT_DATABASE_PASSWORD: integration-only-password
        run: mvn --batch-mode --no-transfer-progress -Pintegration verify

  frontend:
    name: Frontend test, typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      - name: Audit frontend dependency tree
        working-directory: Frontend
        run: npm audit --audit-level=high

      - name: Run frontend tests
        working-directory: Frontend
        run: npm test -- --run

      - name: Type-check frontend
        working-directory: Frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

  compose:
    name: Compose validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install canonical non-secret Compose contract
        run: install -m 0600 deploy/compose.env.example .env

      - name: Verify environment schema contract
        run: pwsh -NoProfile -File scripts/check-env-schema.ps1

      - name: Validate Compose with the canonical environment contract
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p .ci-secrets .ci-certs
          for name in \
            postgres_owner_password postgres_api_password postgres_worker_password \
            redis_app_password rabbitmq_api_password rabbitmq_worker_password jwt_secret \
            content_safety_hmac_secret \
            material-parser-token deepseek_api_key resend_api_key mail_from \
            tencent_app_id tencent_secret_id tencent_secret_key \
            hcaptcha-site-key hcaptcha-secret; do
            openssl rand -hex 48 > ".ci-secrets/$name"
          done
          printf '{"users":[],"vhosts":[],"permissions":[]}\n' > .ci-secrets/rabbitmq-definitions.json
          openssl req -x509 -newkey rsa:2048 -sha256 -days 1 -nodes \
            -subj '/CN=sakuracianna.icu' \
            -addext 'subjectAltName=DNS:sakuracianna.icu,DNS:www.sakuracianna.icu' \
            -keyout .ci-certs/sakuracianna.icu.key \
            -out .ci-certs/sakuracianna.icu_bundle.pem >/dev/null 2>&1
          export MIANBA_APP_IMAGE=mianba-java:ci
          export MIANBA_FRONTEND_IMAGE=mianba-frontend:ci
          export MIANBA_SECRETS_DIR="$PWD/.ci-secrets"
          export MIANBA_CERTS_DIR="$PWD/.ci-certs"
          export MIANBA_RUNTIME_CONFIG_DIR="$PWD/deploy"
          docker compose config --quiet
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml config --quiet
          sh -n deploy/redis-entrypoint.sh
          sh -n deploy/postgres-init/001-create-app-role.sh
          sh -n deploy/prepare-server-secrets.sh
          sh -n deploy/promote-first-admin.sh
          bash -n deploy/validate-compose-env.sh
          bash -n deploy/production-compose.sh
          bash -n deploy/activate-release.sh
          bash -n deploy/rollback-release.sh
          bash -n deploy/ci-business-smoke.sh
          bash deploy/tests/production-compose-contract.sh
          bash deploy/tests/production-release-contract.sh
          bash deploy/tests/rollback-compensation-contract.sh
          docker compose run --rm --no-deps --pull missing nginx nginx -t

      - name: Clean Compose validation resources
        if: always()
        shell: bash
        env:
          MIANBA_APP_IMAGE: mianba-java:ci
          MIANBA_FRONTEND_IMAGE: mianba-frontend:ci
          MIANBA_SECRETS_DIR: ${{ github.workspace }}/.ci-secrets
          MIANBA_CERTS_DIR: ${{ github.workspace }}/.ci-certs
          MIANBA_RUNTIME_CONFIG_DIR: ${{ github.workspace }}/deploy
        run: docker compose down --remove-orphans || true

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - java
      - frontend
      - compose

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install canonical non-secret Compose contract
        run: install -m 0600 deploy/compose.env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Java API and Worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: Backend
          file: Backend/Dockerfile
          push: false
          load: true
          tags: mianba-java:${{ github.sha }}
          cache-from: type=gha,scope=mianba-java
          cache-to: type=gha,mode=max,scope=mianba-java

      - name: Build frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: Frontend
          file: Frontend/Dockerfile
          push: false
          load: true
          tags: mianba-frontend:${{ github.sha }}
          cache-from: type=gha,scope=mianba-frontend
          cache-to: type=gha,mode=max,scope=mianba-frontend

      - name: Start CI topology and verify the complete business flow
        shell: bash
        env:
          MIANBA_APP_IMAGE: mianba-java:${{ github.sha }}
          MIANBA_FRONTEND_IMAGE: mianba-frontend:${{ github.sha }}
          MIANBA_SECRETS_DIR: ${{ github.workspace }}/.ci-runtime-secrets
          MIANBA_CERTS_DIR: ${{ github.workspace }}/.ci-runtime-certs
          MIANBA_RUNTIME_CONFIG_DIR: ${{ github.workspace }}/deploy
        run: |
          set -Eeuo pipefail
          install -d -m 700 "$MIANBA_SECRETS_DIR" "$MIANBA_CERTS_DIR"
          printf 'ci-deepseek-key\n' > "$MIANBA_SECRETS_DIR/deepseek_api_key"
          printf 'ci-resend-key\n' > "$MIANBA_SECRETS_DIR/resend_api_key"
          printf 'ci@example.invalid\n' > "$MIANBA_SECRETS_DIR/mail_from"
          printf '123456789\n' > "$MIANBA_SECRETS_DIR/tencent_app_id"
          printf 'ci-tencent-secret-id\n' > "$MIANBA_SECRETS_DIR/tencent_secret_id"
          printf 'ci-tencent-secret-key\n' > "$MIANBA_SECRETS_DIR/tencent_secret_key"
          openssl rand -hex 24 > "$MIANBA_SECRETS_DIR/hcaptcha-site-key"
          openssl rand -hex 48 > "$MIANBA_SECRETS_DIR/hcaptcha-secret"
          openssl req -x509 -newkey rsa:2048 -sha256 -days 1 -nodes \
            -subj '/CN=sakuracianna.icu' \
            -addext 'subjectAltName=DNS:sakuracianna.icu,DNS:www.sakuracianna.icu' \
            -keyout "$MIANBA_CERTS_DIR/sakuracianna.icu.key" \
            -out "$MIANBA_CERTS_DIR/sakuracianna.icu_bundle.pem" >/dev/null 2>&1
          sh deploy/prepare-server-secrets.sh

          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            up -d --no-build --wait --wait-timeout 240 postgres redis rabbitmq
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            run --rm --no-deps migrate
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            up -d --no-build --no-deps --wait --wait-timeout 240 material-parser api frontend
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            up -d --no-build --no-deps --wait --wait-timeout 120 worker
          test "$(docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            ps --services --status running worker)" = "worker"
          for attempt in $(seq 1 30); do
            docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
              exec -T api curl --fail --silent --show-error --max-time 5 \
              http://127.0.0.1:8000/api/health/readiness >/dev/null && break
            test "$attempt" -lt 30 || { echo "Worker-backed readiness did not become healthy" >&2; exit 1; }
            sleep 4
          done
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            up -d --no-build --no-deps --wait --wait-timeout 120 nginx
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml exec -T nginx nginx -t
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml \
            exec -T nginx wget --no-check-certificate \
            --header='Host: sakuracianna.icu' -q -O /dev/null \
            https://127.0.0.1/api/health/readiness
          bash deploy/ci-business-smoke.sh
          docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml ps

      - name: Diagnose failed integration topology
        if: failure()
        shell: bash
        env:
          MIANBA_APP_IMAGE: mianba-java:${{ github.sha }}
          MIANBA_FRONTEND_IMAGE: mianba-frontend:${{ github.sha }}
          MIANBA_SECRETS_DIR: ${{ github.workspace }}/.ci-runtime-secrets
          MIANBA_CERTS_DIR: ${{ github.workspace }}/.ci-runtime-certs
          MIANBA_RUNTIME_CONFIG_DIR: ${{ github.workspace }}/deploy
        run: |
          set +e
          compose=(docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml)
          "${compose[@]}" ps -a
          for service in postgres redis rabbitmq migrate material-parser api worker frontend nginx; do
            container_id="$("${compose[@]}" ps -a -q "$service" 2>/dev/null)"
            test -n "$container_id" || continue
            state="$(docker inspect --format '{{.State.Status}}' "$container_id" 2>/dev/null)"
            exit_code="$(docker inspect --format '{{.State.ExitCode}}' "$container_id" 2>/dev/null)"
            health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' \
              "$container_id" 2>/dev/null)"
            printf 'service=%s state=%s exit_code=%s health=%s\n' \
              "$service" "$state" "$exit_code" "$health"
            abnormal=false
            if test "$state" != running; then
              abnormal=true
            elif test "$health" != none && test "$health" != healthy; then
              abnormal=true
            fi
            if test "$service" = migrate && test "$state" = exited && test "$exit_code" = 0; then
              abnormal=false
            fi
            if test "$abnormal" = true; then
              docker inspect --format \
                '{{if .State.Health}}{{range .State.Health.Log}}{{println .End "exit=" .ExitCode "output=" .Output}}{{end}}{{end}}' \
                "$container_id"
              docker logs --tail 120 "$container_id" 2>&1
            fi
          done

      - name: Clean integration topology
        if: always()
        shell: bash
        env:
          MIANBA_APP_IMAGE: mianba-java:${{ github.sha }}
          MIANBA_FRONTEND_IMAGE: mianba-frontend:${{ github.sha }}
          MIANBA_SECRETS_DIR: ${{ github.workspace }}/.ci-runtime-secrets
          MIANBA_CERTS_DIR: ${{ github.workspace }}/.ci-runtime-certs
          MIANBA_RUNTIME_CONFIG_DIR: ${{ github.workspace }}/deploy
        run: docker compose -f docker-compose.yml -f deploy/docker-compose.ci.yml down --volumes --remove-orphans || true
