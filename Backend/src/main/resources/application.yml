server:
  port: 8000
  shutdown: graceful
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 80
    max-connections: 256

spring:
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configtree:/run/secrets/}
  application:
    name: mianba-backend
  lifecycle:
    timeout-per-shutdown-phase: 20s
  http:
    clients:
      # 模型请求必须早于 3 分钟数据库租约结束，给事务收尾和 ACK 留出余量。
      connect-timeout: 8s
      read-timeout: 120s
      redirects: dont-follow
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: mianba-scheduler-
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/mianba}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 6
      minimum-idle: 1
      connection-timeout: 3000
      validation-timeout: 2000
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    clean-disabled: true
    validate-migration-naming: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:}
    password: ${SPRING_RABBITMQ_PASSWORD:}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 1
        max-concurrency: 1
        prefetch: 1
        default-requeue-rejected: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jackson:
    property-naming-strategy: SNAKE_CASE
  ai:
    model:
      chat: ${MIANBA_AI_MODEL_CHAT:none}
    deepseek:
      api-key: ${SPRING_AI_DEEPSEEK_API_KEY:}
      chat:
        model: ${SPRING_AI_DEEPSEEK_CHAT_MODEL:deepseek-chat}
        temperature: 0.3
        max-tokens: 1800
    retry:
      max-attempts: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
      group:
        readiness:
          include: readinessState,db,redis,rabbit
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

mianba:
  runtime:
    role: ${MIANBA_RUNTIME_ROLE:api}
    production: ${MIANBA_RUNTIME_PRODUCTION:false}
    local-fallback-enabled: ${MIANBA_RUNTIME_LOCAL_FALLBACK_ENABLED:false}
  ai-runtime:
    # 只用于生产启动校验，Spring AI 仍直接读取 spring.ai.deepseek.api-key。
    deepseek-api-key: ${spring.ai.deepseek.api-key:}
    # 仅允许完整 CI 拓扑显式启用；生产启动门禁会拒绝该值为 true。
    stub-enabled: ${MIANBA_AI_RUNTIME_STUB_ENABLED:false}
  ai:
    lease-recovery-delay-ms: ${MIANBA_AI_LEASE_RECOVERY_DELAY_MS:15000}
  security:
    jwt-secret: ${MIANBA_SECURITY_JWT_SECRET:}
    cookie-secure: ${MIANBA_SECURITY_COOKIE_SECURE:false}
    cookie-same-site: ${MIANBA_SECURITY_COOKIE_SAME_SITE:Lax}
    allowed-origins: ${MIANBA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  infrastructure:
    database-url: ${spring.datasource.url:}
    database-username: ${spring.datasource.username:}
    database-password: ${spring.datasource.password:}
    redis-host: ${SPRING_DATA_REDIS_HOST:}
    rabbit-host: ${SPRING_RABBITMQ_HOST:}
    rabbit-username: ${spring.rabbitmq.username:}
    rabbit-password: ${spring.rabbitmq.password:}
  identity:
    access-token-minutes: ${MIANBA_AUTH_ACCESS_TOKEN_MINUTES:120}
    email-code-seconds: ${MIANBA_AUTH_EMAIL_CODE_SECONDS:300}
    expose-dev-codes: ${MIANBA_AUTH_EXPOSE_DEV_CODES:false}
    mail-from: ${MIANBA_IDENTITY_MAIL_FROM:}
    resend-api-key: ${MIANBA_IDENTITY_RESEND_API_KEY:}
  abuse:
    login-ip-limit: ${MIANBA_ABUSE_LOGIN_IP_LIMIT:20}
    login-email-limit: ${MIANBA_ABUSE_LOGIN_EMAIL_LIMIT:8}
    admin-login-limit: ${MIANBA_ABUSE_ADMIN_LOGIN_LIMIT:5}
    email-code-ip-limit: ${MIANBA_ABUSE_EMAIL_CODE_IP_LIMIT:5}
    email-code-email-limit: ${MIANBA_ABUSE_EMAIL_CODE_EMAIL_LIMIT:3}
    window-seconds: ${MIANBA_ABUSE_WINDOW_SECONDS:600}
  hcaptcha:
    enabled: ${MIANBA_HCAPTCHA_ENABLED:false}
    site-key: ${MIANBA_HCAPTCHA_SITE_KEY:}
    secret: ${MIANBA_HCAPTCHA_SECRET:${hcaptcha-secret:}}
    verify-url: ${MIANBA_HCAPTCHA_VERIFY_URL:https://api.hcaptcha.com/siteverify}
    connect-timeout: ${MIANBA_HCAPTCHA_CONNECT_TIMEOUT:2s}
    request-timeout: ${MIANBA_HCAPTCHA_REQUEST_TIMEOUT:5s}
    max-response-bytes: ${MIANBA_HCAPTCHA_MAX_RESPONSE_BYTES:16384}
  material:
    max-upload-bytes: 5242880
    max-pdf-pages: 50
    max-archive-entries: 2000
    max-expanded-bytes: 20971520
  material-parser:
    base-url: ${MIANBA_MATERIAL_PARSER_BASE_URL:http://127.0.0.1:8090}
    token: ${MIANBA_MATERIAL_PARSER_TOKEN:${material-parser-token:}}
    connect-timeout: ${MIANBA_MATERIAL_PARSER_CONNECT_TIMEOUT:2s}
    request-timeout: ${MIANBA_MATERIAL_PARSER_REQUEST_TIMEOUT:8s}
    max-upload-bytes: 5242880
    max-response-bytes: 65536
  speech:
    tencent-app-id: ${MIANBA_SPEECH_TENCENT_APP_ID:}
    tencent-secret-id: ${MIANBA_SPEECH_TENCENT_SECRET_ID:}
    tencent-secret-key: ${MIANBA_SPEECH_TENCENT_SECRET_KEY:}
    default-engine: ${MIANBA_SPEECH_DEFAULT_ENGINE:16k_zh_en}
    ielts-engine: ${MIANBA_SPEECH_IELTS_ENGINE:16k_en}
    tts-voice-types: ${MIANBA_SPEECH_TTS_VOICE_TYPES:603006,603005,603003,603004,603007,602004,602005,502005,502006,502003,502001}
    need-vad: ${MIANBA_SPEECH_NEED_VAD:1}
    max-seconds: ${MIANBA_SPEECH_MAX_SECONDS:300}
    max-concurrent-sessions: ${MIANBA_SPEECH_MAX_CONCURRENT_SESSIONS:2}
